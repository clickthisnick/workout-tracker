<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Workout Tracker</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --accent: #7c2d2d;
    --accent-light: #a84444;
    --text: #f0f0f0;
    --text-dim: #9a9a9a;
    --border: #333;
  }
  * { box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    margin: 0;
    height: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    max-width: 480px;
    margin-inline: auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  select, input, button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  button {
    background: var(--accent);
    cursor: pointer;
    font-weight: 600;
  }
  button:active { background: var(--accent-light); }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent-light);
    outline-offset: 2px;
  }
  #selectWorkout { width: 100%; }
  #topStatus:empty { display: none; }
  #workout {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  #header { display: flex; flex-direction: column; gap: 2px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  #workoutName { font-size: 18px; font-weight: 700; color: var(--text); }
  .icon-btn {
    padding: 4px 8px;
    font-size: 14px;
    line-height: 1.4;
    background: var(--surface);
    flex-shrink: 0;
  }
  #editPanel { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
  #editPanel label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  #editPanel label input { width: 80px; text-align: right; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 0 6px; color: var(--text-dim); font-size: 11px; }
  .meta-row span:not(:empty):not(:last-child)::after { content: " · "; }
  #currentExerciseName { width: 100%; font-size: 16px; font-weight: 600; }
  .nav-row { display: flex; gap: 8px; }
  .nav-row button { flex: 1; padding: 8px; font-size: 14px; }
  .nav-row button:disabled {
    opacity: 0.4;
    cursor: default;
    background: var(--surface);
  }
  .prev-block {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.4;
    border-left: 3px solid var(--border);
    padding-left: 8px;
  }
  .prev-block b { color: var(--text); }
  .prev-row { display: flex; flex-wrap: wrap; gap: 0 8px; }
  .prev-row span:not(:empty):not(:last-child)::after { content: " · "; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 2px 4px; vertical-align: middle; }
  td input { width: 100%; }
  .quick-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 2px 0; }
  .quick-row button {
    width: 3.2em;
    padding: 4px 0;
    text-align: center;
    font-size: 12px;
    font-weight: 400;
    background: var(--surface);
  }
  .quick-row button.quick-current {
    border-color: var(--accent-light);
    font-weight: 700;
  }
  .save-time-cell { text-align: right; }
  .action-row { display: flex; gap: 8px; margin-top: 4px; }
  .action-row button { flex: 1; padding: 10px; font-size: 14px; }
  #timer { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; margin-left: 6px; }
  #status { margin-top: 2px; font-size: 12px; color: var(--text-dim); }
</style>
</head>

<select id="selectWorkout" onchange="selectWorkout()">
  <option>Choose a workout</option>
</select>
<div id="topStatus" style="color: var(--text-dim); font-size: 14px; margin-bottom: 8px;"></div>

<div id="workout" style="visibility:hidden">
  <div id="header">
    <div class="header-top">
      <span id="workoutName"></span>
      <button id="editToggle" class="icon-btn" onclick="toggleEditMode()" aria-label="Settings">⚙</button>
    </div>
    <div class="meta-row">
      <span id="workoutLastCompleted"></span>
      <span id="workoutLastDuration"></span>
      <span id="workoutCurrentDuration"></span>
    </div>
  </div>

  <div id="editPanel" style="display:none">
    <label>Weight quick-button increment
      <input type="number" id="cfgWeightInc" inputmode="decimal" step="any">
    </label>
    <label>Reps quick-button increment
      <input type="number" id="cfgRepsInc" inputmode="decimal" step="any">
    </label>
    <label>Default rest timer (seconds)
      <input type="number" id="cfgTimerDefault" inputmode="numeric" step="1">
    </label>
    <div class="action-row">
      <button onclick="applyEditPanel()">Apply</button>
      <button onclick="toggleEditMode()">Done</button>
    </div>
  </div>

  <div id="mainContent">
    <input id="currentExerciseName" name="currentExerciseName">

    <div class="nav-row">
      <button id="prevExerciseBtn" onclick="prevExercise()">◀ Prev</button>
      <button onclick="nextExercise()">Next ▶</button>
    </div>

    <div class="prev-block">
      <b>Previous:</b>
      <div class="prev-row">
        <span id="previousWorkoutExerciseReps"></span>
        <span id="previousWorkoutExerciseWeights"></span>
        <span id="previousWorkoutExerciseTimes"></span>
      </div>
    </div>

    <b>Current:</b>
    <table>
      <tbody>
        <tr>
          <td><label for="reps">Reps:</label></td>
          <td><input type="text" id="reps" name="reps" inputmode="decimal"></td>
        </tr>
        <tr>
          <td></td>
          <td colspan="2"><div id="repsQuick" class="quick-row"></div></td>
        </tr>
        <tr>
          <td><label for="weights">Weight:</label></td>
          <td><input type="text" id="weights" name="weights" inputmode="decimal"></td>
        </tr>
        <tr>
          <td></td>
          <td colspan="2"><div id="weightsQuick" class="quick-row"></div></td>
        </tr>
        <tr>
          <td><label for="times">Time:</label></td>
          <td><input type="text" id="times" name="times"></td>
          <td class="save-time-cell"><button onclick="saveTime()">Save Time</button></td>
        </tr>
      </tbody>
    </table>

    <div class="action-row">
      <button onclick="saveWorkout()">Save Workout</button>
      <button onclick="resetTimer()">Timer <span id="timer"></span></button>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // Config
  // ---------------------------------------------------------------
  const baseUrl = 'https://www.clickthisnick.com/workout-tracker';
  // When running locally: python3 -m http.server, then use:
  // const baseUrl = 'http://localhost:8000'

  const url = new URL(location.href);

  // Quick-increment buttons shown under Reps/Weight, based on the previous
  // session's last value for that exercise. Each offset is multiplied by
  // the increment and added to the previous value; 0 = previous value as-is.
  // Increments (and the default rest timer) are editable via the ⚙ button,
  // which stores the chosen values in the URL so they survive a reload.
  const SETTINGS_DEFAULTS = {
    weightInc: 5,
    repsInc: 1,
    timerDefault: 90
  };

  const QUICK_BUTTON_OFFSETS = [-3, -2, -1, 0, 1, 2, 3];

  const QUICK_BUTTON_CONFIG = {
    weights: { increment: SETTINGS_DEFAULTS.weightInc, offsets: QUICK_BUTTON_OFFSETS },
    reps: { increment: SETTINGS_DEFAULTS.repsInc, offsets: QUICK_BUTTON_OFFSETS }
  };

  let DEFAULT_TIMER_DURATION = SETTINGS_DEFAULTS.timerDefault;

  function getSettings() {
    return {
      weightInc: parseFloat(url.searchParams.get('weightInc')) || SETTINGS_DEFAULTS.weightInc,
      repsInc: parseFloat(url.searchParams.get('repsInc')) || SETTINGS_DEFAULTS.repsInc,
      timerDefault: parseInt(url.searchParams.get('timerDefault'), 10) || SETTINGS_DEFAULTS.timerDefault
    };
  }

  // Applies the current settings (from the URL, or defaults) to the
  // live config objects used elsewhere in the app.
  function applySettings() {
    const s = getSettings();
    QUICK_BUTTON_CONFIG.weights.increment = s.weightInc;
    QUICK_BUTTON_CONFIG.reps.increment = s.repsInc;
    DEFAULT_TIMER_DURATION = s.timerDefault;
  }

  applySettings();

  // GitHub repo info, used to build the "edit this file" link in the email
  const GH_OWNER = 'clickthisnick';
  const GH_REPO = 'workout-tracker';
  const GH_BRANCH = 'main';

  // ---------------------------------------------------------------
  // Timer-complete sound: plays the embedded a-tone-multiplied.mp3
  // (embedded as a base64 data URI, so no external file dependency),
  // falling back to a synthesized tone if playback fails for any reason.
  // ---------------------------------------------------------------
  let audioCtx = null;
  let timerInterval = "";
  let currentTimer = 0;

  // Tracks whether we've already unlocked audio during this page load.
  // Mobile browsers only allow audio after a user gesture has played
  // something, so the first click anywhere "unlocks" audio with a
  // silent/muted blip before the real timer-complete sound is needed.
  let audioUnlocked = false;

  function ensureAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;

    try {
      const ctx = ensureAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      gain.gain.value = 0; // silent
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.01);
    } catch (e) {
      console.error('audio context unlock failed', e);
    }

    const audioEl = document.getElementById('beepSound');
    if (audioEl) {
      audioEl.muted = true;
      const p = audioEl.play();
      const reset = () => {
        audioEl.pause();
        audioEl.currentTime = 0;
        audioEl.muted = false;
      };
      if (p && typeof p.then === 'function') {
        p.then(reset).catch(reset);
      } else {
        reset();
      }
    }
  }

  // Any button press anywhere on the page counts as the user gesture
  // that unlocks audio playback.
  document.addEventListener('click', (e) => {
    if (e.target.closest && e.target.closest('button')) {
      unlockAudio();
    }
  }, true);

  function beep() {
    const audioEl = document.getElementById('beepSound');
    if (audioEl) {
      try {
        audioEl.currentTime = 0;
        const p = audioEl.play();
        if (p && typeof p.then === 'function') {
          p.catch(e => {
            console.warn('beep audio failed, falling back to tone', e);
            beepTone();
          });
        }
        return;
      } catch (e) {
        console.warn('beep audio failed, falling back to tone', e);
      }
    }
    beepTone();
  }

  function beepTone() {
    try {
      const ctx = ensureAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    } catch (e) {
      console.error('beep tone failed', e);
    }
  }

  // ---------------------------------------------------------------
  // Loading the list of workouts / a specific workout
  //
  // Routine files may contain lines starting with "//" (left behind
  // by pasting an emailed entry that included instructions). Strip
  // those before parsing so plain JSON.parse still works.
  // ---------------------------------------------------------------
  function parseJsonWithComments(text) {
    return JSON.parse(text.replace(/^[ \t]*\/\/.*$/gm, ''));
  }

  const loadWorkoutOptions = async () => {
    let workouts;
    try {
      const response = await fetch(`${baseUrl}/src/workouts/active.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      workouts = parseJsonWithComments(await response.text());
      localStorage.setItem('wt_cache_active', JSON.stringify(workouts));
    } catch (e) {
      console.warn('Could not fetch active.json, falling back to cache', e);
      const cached = localStorage.getItem('wt_cache_active');
      if (cached) {
        workouts = JSON.parse(cached);
        setTopStatus('📴 Offline — showing your cached workout list.');
      } else {
        setTopStatus('📴 No connection and nothing cached yet — connect to the internet once to load your routines.');
        return;
      }
    }

    const workoutNames = workouts['workouts'];
    let select = document.getElementById("selectWorkout");

    workoutNames.forEach(workout => {
      let el = document.createElement("option");
      el.textContent = workout;
      el.value = workout;
      select.appendChild(el);
    });
  };

  const getData = async (routine) => {
    const cacheKey = `wt_cache_routine_${routine}`;
    let resp;

    try {
      const response = await fetch(`${baseUrl}/src/workouts/${routine}?t=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      resp = parseJsonWithComments(await response.text());
      localStorage.setItem(cacheKey, JSON.stringify(resp));
    } catch (e) {
      console.warn(`Could not fetch ${routine}, falling back to cache`, e);
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        resp = JSON.parse(cached);
      } else {
        setTopStatus(`📴 Couldn't load "${routine}" and no offline copy is saved yet. Connect to the internet once to download it.`);
        document.getElementById("selectWorkout").style.display = "";
        return;
      }
    }

    const workout = resp['workouts'];
    const workoutIndex = workout.length - 1;
    const previousWorkout = workout[workoutIndex];

    url.searchParams.set('name', resp['name']);
    url.searchParams.set('file', routine);
    url.searchParams.set('previousWorkout', JSON.stringify(previousWorkout));

    const currentWorkout = JSON.parse(JSON.stringify(previousWorkout));
    currentWorkout['startMilliseconds'] = getTimeMillisecondsDate();
    currentWorkout['endMilliseconds'] = 0;

    for (let i = 0; i < currentWorkout['exercises'].length; i++) {
      currentWorkout['exercises'][i]['reps'] = "";
      currentWorkout['exercises'][i]['weights'] = "";
      currentWorkout['exercises'][i]['times'] = "";
    }

    url.searchParams.set('currentWorkout', JSON.stringify(currentWorkout));
    url.searchParams.set('currentExerciseId', 0);

    reloadPage(url);
  };

  // ---------------------------------------------------------------
  // Small helpers
  // ---------------------------------------------------------------
  function decodeQueryParam(p) {
    return decodeURIComponent(p.replace(/\+/g, " "));
  }

  function getTimeMillisecondsDate() {
    return new Date().getTime();
  }

  function reloadPage(targetUrl) {
    location.href = targetUrl;
  }

  function loadJSONQueryParameter(data) {
    return JSON.parse(decodeQueryParam(data));
  }

  function calculateLastWorkoutDuration(milliseconds) {
    let minutes = Math.floor(milliseconds / 1000 / 60);
    let seconds = Math.round((milliseconds - (minutes * 1000 * 60)) / 1000);
    return [minutes, seconds];
  }

  function calulateDaysAgo(endMilliseconds) {
    const ms = getTimeMillisecondsDate();
    const msSinceWorkout = ms - endMilliseconds;
    return Math.floor(msSinceWorkout / (1000 * 60 * 60) / 24);
  }

  function setCurrentWorkoutDuration(currentWorkout) {
    const elapsed = Date.now() - currentWorkout['startMilliseconds'];
    const minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((elapsed % (1000 * 60)) / 1000);
    document.getElementById('workoutCurrentDuration').innerHTML =
      `Current time: ${minutes}m ${seconds}s`;
  }

  // Given a comma-separated list like "12,6,4,5", return the numeric value
  // at `index` (clamped to the last entry if index is past the end), or
  // null if there isn't one. Used so quick-buttons can match up with the
  // specific set you're currently entering (set 1, set 2, ...).
  function numberAtIndex(value, index) {
    if (!value) return null;
    const parts = String(value).split(',').map(p => p.trim()).filter(p => p !== '');
    if (parts.length === 0) return null;
    const i = Math.min(Math.max(index, 0), parts.length - 1);
    const n = parseFloat(parts[i]);
    return isNaN(n) ? null : n;
  }

  // How many sets have already been entered in a field, i.e. which set
  // (0-indexed) the next quick-button tap would be filling in.
  function enteredSetCount(inputId) {
    const el = document.getElementById(inputId);
    const value = el.value.trim();
    if (!value) return 0;
    return value.split(',').filter(p => p.trim() !== '').length;
  }

  // Appends a value to a comma-separated input field (same pattern as
  // "Save Time"), so quick-buttons build up "12,12,12" as you go.
  function appendQuickValue(inputId, value) {
    unlockAudio();
    const el = document.getElementById(inputId);
    const current = el.value.trim().replace(/,+$/, '');
    el.value = current ? `${current},${value}` : `${value}`;
    refreshQuickButtons();
  }

  // Renders a row of buttons around `baseValue` (previous session's value
  // for this set). Offsets are e.g. [-3,-2,-1,0,1,2,3]: 0 is `baseValue`
  // itself (highlighted). If a low-side offset would produce a value <= 0
  // (not a useful weight/reps suggestion), it's dropped and an extra slot
  // is added on the high side instead, so the total count stays the same
  // -- e.g. baseValue=5, increment=5 gives 5,10,15,20,25,30,35 with 5
  // (the previous value) highlighted but no longer centered.
  function renderQuickButtons(containerId, inputId, baseValue, config) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    if (baseValue === null) return;

    const targetCount = config.offsets.length;
    const queue = [...config.offsets];
    let nextOffset = Math.max(...config.offsets) + 1;
    const results = [];

    while (results.length < targetCount && queue.length > 0) {
      const offset = queue.shift();
      const value = baseValue + offset * config.increment;

      if (value <= 0) {
        queue.push(nextOffset);
        nextOffset += 1;
        continue;
      }

      results.push({ value, isCurrent: offset === 0 });
    }

    results.forEach(({ value, isCurrent }) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = value;
      if (isCurrent) btn.classList.add('quick-current');
      btn.onclick = () => appendQuickValue(inputId, value);
      container.appendChild(btn);
    });
  }

  function setStatus(message) {
    const el = document.getElementById('status');
    if (el) el.textContent = message;
  }

  function setTopStatus(message) {
    const el = document.getElementById('topStatus');
    if (el) el.textContent = message;
  }

  // ---------------------------------------------------------------
  // Workflow: select / start / navigate
  // ---------------------------------------------------------------
  function startWorkout(workoutName) {
    document.getElementById("selectWorkout").style.display = "none";

    if (!url.searchParams.get("name")) {
      getData(workoutName);
      return;
    }

    renderPage();
  }

  function saveExerciseData(targetUrl, reload = false) {
    const currentWorkout = loadJSONQueryParameter(targetUrl.searchParams.get('currentWorkout'));
    const currentExerciseId = parseInt(targetUrl.searchParams.get("currentExerciseId"));

    const reps = document.getElementById('reps').value;
    const weights = document.getElementById('weights').value;
    const times = document.getElementById('times').value;
    const currentExerciseName = document.getElementById('currentExerciseName').value;

    currentWorkout['exercises'][currentExerciseId]['name'] = currentExerciseName;
    currentWorkout['exercises'][currentExerciseId]['reps'] = reps;
    currentWorkout['exercises'][currentExerciseId]['weights'] = weights;
    currentWorkout['exercises'][currentExerciseId]['times'] = times;

    targetUrl.searchParams.set("currentWorkout", JSON.stringify(currentWorkout));

    if (reload) {
      reloadPage(targetUrl);
    }

    return currentWorkout;
  }

  function nextExercise() {
    const currentWorkout = loadJSONQueryParameter(url.searchParams.get('currentWorkout'));
    const currentExerciseId = parseInt(url.searchParams.get("currentExerciseId"));
    const currentExercisesMaxIndex = currentWorkout['exercises'].length - 1;

    saveExerciseData(url);

    if (currentExerciseId + 1 > currentExercisesMaxIndex) {
      const updatedWorkout = loadJSONQueryParameter(url.searchParams.get('currentWorkout'));
      updatedWorkout['exercises'].push({
        "name": "",
        "reps": "",
        "weights": "",
        "times": "",
      });
      url.searchParams.set('currentWorkout', JSON.stringify(updatedWorkout));
    }

    url.searchParams.set("currentExerciseId", currentExerciseId + 1);
    reloadPage(url);
  }

  function prevExercise() {
    const currentExerciseId = parseInt(url.searchParams.get("currentExerciseId"));

    if (currentExerciseId == 0) {
      return;
    }

    saveExerciseData(url);
    url.searchParams.set("currentExerciseId", currentExerciseId - 1);
    reloadPage(url);
  }

  // ---------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------
  function renderPage() {
    const name = url.searchParams.get('name');
    const previousWorkout = loadJSONQueryParameter(url.searchParams.get('previousWorkout'));
    const currentWorkout = loadJSONQueryParameter(url.searchParams.get('currentWorkout'));
    const currentExerciseId = parseInt(url.searchParams.get('currentExerciseId'));
    const daysAgo = calulateDaysAgo(previousWorkout['endMilliseconds']);
    const previousWorkoutDuration = calculateLastWorkoutDuration(
      previousWorkout['endMilliseconds'] - previousWorkout['startMilliseconds']
    );
    const previousWorkoutDurationMinutes = previousWorkoutDuration[0];
    const previousWorkoutDurationSeconds = previousWorkoutDuration[1];

    const previousExercises = previousWorkout['exercises'];

    let previousExercise;
    if (currentExerciseId <= previousExercises.length - 1) {
      previousExercise = previousExercises[currentExerciseId];
    } else {
      previousExercise = {
        "name": "-",
        "reps": "-",
        "weights": "-",
        "times": "-",
      };
    }

    const currentExercises = currentWorkout['exercises'];
    const currentExercise = currentExercises[currentExerciseId];
    const currentExerciseName = currentExercise['name'];

    document.getElementById('workoutName').innerHTML = name;
    document.getElementById('workoutLastCompleted').innerHTML = `Last workout: ${daysAgo}d ago`;
    document.getElementById('workoutLastDuration').innerHTML =
      `Last duration: ${previousWorkoutDurationMinutes}m ${previousWorkoutDurationSeconds}s`;
    setCurrentWorkoutDuration(currentWorkout);

    setInterval(() => {
      setCurrentWorkoutDuration(currentWorkout);
    }, 500);

    document.getElementById('workout').style.visibility = 'visible';
    document.getElementById('prevExerciseBtn').disabled = (currentExerciseId === 0);

    const previousWorkoutExerciseReps = previousExercise['reps'] || "";
    const previousWorkoutExerciseWeights = previousExercise['weights'] || "";
    const previousWorkoutExerciseTimes = previousExercise['times'] || "";

    document.getElementById('currentExerciseName').value = currentExerciseName;
    document.getElementById('previousWorkoutExerciseReps').innerHTML = `Reps: ${previousWorkoutExerciseReps || '-'}`;
    document.getElementById('previousWorkoutExerciseWeights').innerHTML = `Weight: ${previousWorkoutExerciseWeights || '-'}`;
    document.getElementById('previousWorkoutExerciseTimes').innerHTML = previousWorkoutExerciseTimes ? `Time: ${previousWorkoutExerciseTimes}` : '';

    document.getElementById('reps').value = currentExercise['reps'];
    document.getElementById('weights').value = currentExercise['weights'];
    document.getElementById('times').value = currentExercise['times'];

    refreshQuickButtons();
  }

  function selectWorkout() {
    const selectedWorkoutRoutineName = document.getElementById("selectWorkout").value;
    startWorkout(selectedWorkoutRoutineName);
  }

  // Re-renders just the quick-increment buttons for the current exercise,
  // using whatever increments are currently in QUICK_BUTTON_CONFIG. Used
  // after changing settings, without re-running all of renderPage (which
  // would stack up duplicate setInterval timers).
  // Re-renders the quick-increment buttons for the current exercise, based
  // on how many sets have already been entered: set 1 in progress -> use
  // previous session's set 1 value, set 2 -> set 2 value, etc. (clamped to
  // the previous session's last set if you go further than it did).
  function refreshQuickButtons() {
    const previousWorkout = loadJSONQueryParameter(url.searchParams.get('previousWorkout'));
    const currentExerciseId = parseInt(url.searchParams.get('currentExerciseId'));
    const previousExercises = previousWorkout['exercises'];
    const previousExercise = currentExerciseId <= previousExercises.length - 1
      ? previousExercises[currentExerciseId]
      : {};

    const repsIndex = enteredSetCount('reps');
    const weightsIndex = enteredSetCount('weights');

    renderQuickButtons('repsQuick', 'reps', numberAtIndex(previousExercise['reps'], repsIndex), QUICK_BUTTON_CONFIG.reps);
    renderQuickButtons('weightsQuick', 'weights', numberAtIndex(previousExercise['weights'], weightsIndex), QUICK_BUTTON_CONFIG.weights);
  }

  // ---------------------------------------------------------------
  // Edit mode: lets you change defaults (quick-button increments, rest
  // timer length) on the fly. Saved into the URL's query parameters so
  // they survive a page reload/bookmark.
  // ---------------------------------------------------------------
  function toggleEditMode() {
    const panel = document.getElementById('editPanel');
    const main = document.getElementById('mainContent');
    const isOpen = panel.style.display !== 'none';

    if (isOpen) {
      panel.style.display = 'none';
      main.style.display = '';
    } else {
      const s = getSettings();
      document.getElementById('cfgWeightInc').value = s.weightInc;
      document.getElementById('cfgRepsInc').value = s.repsInc;
      document.getElementById('cfgTimerDefault').value = s.timerDefault;
      panel.style.display = '';
      main.style.display = 'none';
    }
  }

  function applyEditPanel() {
    const weightInc = parseFloat(document.getElementById('cfgWeightInc').value) || SETTINGS_DEFAULTS.weightInc;
    const repsInc = parseFloat(document.getElementById('cfgRepsInc').value) || SETTINGS_DEFAULTS.repsInc;
    const timerDefault = parseInt(document.getElementById('cfgTimerDefault').value, 10) || SETTINGS_DEFAULTS.timerDefault;

    url.searchParams.set('weightInc', weightInc);
    url.searchParams.set('repsInc', repsInc);
    url.searchParams.set('timerDefault', timerDefault);
    history.replaceState(null, '', url);

    applySettings();
    refreshQuickButtons();
    toggleEditMode();
  }

  // ---------------------------------------------------------------
  // Timer
  // ---------------------------------------------------------------
  function saveTime() {
    let times = document.getElementById('times').value;
    let timeValue = `${Math.floor(currentTimer)}`;

    if (timeValue == "0") {
      return;
    }

    if (times) {
      timeValue = `${times},${timeValue}`;
    }

    document.getElementById('times').value = timeValue;
  }

  function resetTimer() {
    // Create/resume the audio context here, while we're inside a user
    // gesture, so the later beep() call from setInterval is allowed to play.
    ensureAudioCtx();

    currentTimer = 0;
    const timeSpan = document.getElementById('timer');

    const currentExerciseId = url.searchParams.get("currentExerciseId");
    const currentWorkout = loadJSONQueryParameter(url.searchParams.get('currentWorkout'));
    const seconds = currentWorkout["exercises"][currentExerciseId]['timer_duration'] || DEFAULT_TIMER_DURATION;
    const now = new Date().getTime();
    const deadline = seconds * 1000 + now;

    if (timerInterval) {
      clearInterval(timerInterval);
    }

    timerInterval = setInterval(() => {
      const currentTime = new Date().getTime();
      const distance = deadline - currentTime;
      let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      if (minutes < 0) {
        minutes = minutes + 1;
      }

      if (minutes == 0 && seconds <= 0 && seconds > -2) {
        beep();
      }

      let timeToShow = minutes + 'm ' + seconds + 's';
      if (minutes == 0) {
        timeToShow = seconds + 's';
      }

      currentTimer += 0.5;
      timeSpan.innerHTML = timeToShow;
    }, 500);
  }

  // ---------------------------------------------------------------
  // Save workout: draft an email with just today's entry (not the
  // whole file) plus a link to edit the routine on GitHub. Open the
  // email, paste the entry into the "workouts" array, commit.
  //
  // Add ?email=you@example.com to the URL (and bookmark/save that
  // link) so your address isn't stored anywhere in this file.
  // ---------------------------------------------------------------
  function saveWorkout() {
    const currentWorkout = saveExerciseData(url, false);
    currentWorkout['endMilliseconds'] = getTimeMillisecondsDate();
    currentWorkout['exercises'] = currentWorkout['exercises'].filter(exercise => exercise['name']);

    url.searchParams.set("currentWorkout", JSON.stringify(currentWorkout));
    history.replaceState(null, '', url);

    const file = url.searchParams.get('file');
    const name = url.searchParams.get('name');
    const email = url.searchParams.get('email') || '';

    const editUrl = `https://github.com/${GH_OWNER}/${GH_REPO}/edit/${GH_BRANCH}/src/workouts/${file}`;

    const subject = `Workout - ${name}`;
    const body =
      `// ${name} - ${new Date(currentWorkout.startMilliseconds).toLocaleDateString()}\n` +
      `// Open: ${editUrl}\n` +
      `// Scroll to the end of the "workouts" array (just before its closing ]) and paste this entire block right before that ]\n` +
      `,${JSON.stringify(currentWorkout)}`;

    const a = document.createElement('a');
    a.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    a.click();

    setStatus('📧 Email drafted. Open it, then paste the entry into GitHub on your phone.');
  }

  // ---------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------
  document.getElementById('reps').addEventListener('input', refreshQuickButtons);
  document.getElementById('weights').addEventListener('input', refreshQuickButtons);

  if (url.searchParams.get('name')) {
    setTimeout(function () {
      startWorkout(url.searchParams.get('name'));
    }, 0);
  } else {
    loadWorkoutOptions();
  }
</script>
</body>
</html>
